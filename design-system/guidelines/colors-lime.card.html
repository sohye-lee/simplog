<!-- @dsCard group="Colors" viewport="700x160" name="Ledger Lime — the one point color" subtitle="#CCF017 · use sparingly, one action per view" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); font-family: var(--font-mono); }
  .row { display: flex; gap: 10px; }
  .chip { flex: 1; border-radius: var(--radius-md); border: 1px solid var(--border); overflow: hidden; }
  .fill { height: 64px; }
  .meta { padding: 8px 10px; font-size: 11px; }
  .meta b { display: block; color: var(--text-primary); font-weight: 600; }
  .meta span { color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="chip"><div class="fill" style="background:var(--lime-100)"></div><div class="meta"><b>100</b><span>#F3FBC4</span></div></div>
    <div class="chip"><div class="fill" style="background:var(--lime-300)"></div><div class="meta"><b>300</b><span>#E0F56B</span></div></div>
    <div class="chip"><div class="fill" style="background:var(--lime-400)"></div><div class="meta"><b>400</b><span>#D6F23C</span></div></div>
    <div class="chip"><div class="fill" style="background:var(--lime-500); box-shadow: inset 0 0 0 2px var(--ink-900)"></div><div class="meta"><b>500 · base</b><span>#CCF017</span></div></div>
    <div class="chip"><div class="fill" style="background:var(--lime-600)"></div><div class="meta"><b>600</b><span>#B4D60C</span></div></div>
    <div class="chip"><div class="fill" style="background:var(--lime-700)"></div><div class="meta"><b>700 · text</b><span>#94B006</span></div></div>
  </div>
</body>
</html>
