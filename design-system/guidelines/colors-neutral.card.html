<!-- @dsCard group="Colors" viewport="700x150" name="Neutral ink ramp" subtitle="Warm-neutral scale, near-black → paper" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); }
  .sw { flex: 1; height: 88px; display: flex; align-items: flex-end; padding: 8px; }
  .sw span { font-size: 10px; font-family: var(--font-mono); letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--ink-900)"><span style="color:#fff">900</span></div>
    <div class="sw" style="background:var(--ink-800)"><span style="color:#fff">800</span></div>
    <div class="sw" style="background:var(--ink-700)"><span style="color:#fff">700</span></div>
    <div class="sw" style="background:var(--ink-600)"><span style="color:#fff">600</span></div>
    <div class="sw" style="background:var(--ink-500)"><span style="color:#fff">500</span></div>
    <div class="sw" style="background:var(--ink-400)"><span style="color:#fff">400</span></div>
    <div class="sw" style="background:var(--ink-300)"><span style="color:var(--ink-900)">300</span></div>
    <div class="sw" style="background:var(--ink-200)"><span style="color:var(--ink-900)">200</span></div>
    <div class="sw" style="background:var(--ink-100)"><span style="color:var(--ink-900)">100</span></div>
    <div class="sw" style="background:var(--ink-50)"><span style="color:var(--ink-900)">50</span></div>
    <div class="sw" style="background:var(--paper)"><span style="color:var(--ink-900)">paper</span></div>
  </div>
</body>
</html>
