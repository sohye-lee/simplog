<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation & focus ring" subtitle="Borders over shadows; lime ring on focus" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-sunken); font-family: var(--font-mono); }
  .row { display: flex; gap: 20px; align-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 96px; height: 60px; background: var(--surface-card); border: 1px solid var(--border); border-radius: var(--radius-md); }
  .lbl { font-size: 11px; color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="lbl">xs</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="lbl">sm</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="lbl">md</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="lbl">lg</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--ring-accent); border-color:var(--ink-900)"></div><span class="lbl">focus ring</span></div>
  </div>
</body>
</html>
