<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); font-family: var(--font-mono); }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .bar { height: 14px; background: var(--lime-500); border-radius: 2px; }
  .lbl { font-size: 11px; color: var(--text-secondary); width: 92px; }
</style>
</head>
<body>
  <div class="row"><span class="lbl">1 · 4px</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="lbl">2 · 8px</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="lbl">3 · 12px</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="lbl">4 · 16px</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="lbl">6 · 24px</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="lbl">8 · 32px</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="lbl">12 · 48px</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="lbl">16 · 64px</span><div class="bar" style="width:64px"></div></div>
</body>
</html>
