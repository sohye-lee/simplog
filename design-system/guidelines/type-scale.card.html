<!-- @dsCard group="Type" viewport="700x230" name="Type scale — IBM Plex Mono" subtitle="Mono does the work; size & weight give hierarchy" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); font-family: var(--font-mono); color: var(--text-primary); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 6px 0; border-bottom: 1px solid var(--ink-100); }
  .row:last-child { border-bottom: none; }
  .k { width: 96px; flex-shrink: 0; font-size: 10px; color: var(--text-muted); letter-spacing: 0.04em; }
  .s { line-height: 1.1; }
</style>
</head>
<body>
  <div class="row"><span class="k">3xl · 40</span><span class="s" style="font-size:var(--text-3xl); font-weight:600; letter-spacing:-0.01em">₩2,480,000</span></div>
  <div class="row"><span class="k">2xl · 30</span><span class="s" style="font-size:var(--text-2xl); font-weight:600">Balance left</span></div>
  <div class="row"><span class="k">lg · 18</span><span class="s" style="font-size:var(--text-lg); font-weight:500">Card heading</span></div>
  <div class="row"><span class="k">md · 15</span><span class="s" style="font-size:var(--text-md)">Body — a single lunch receipt, logged.</span></div>
  <div class="row"><span class="k">sm · 13</span><span class="s" style="font-size:var(--text-sm); color:var(--text-secondary)">Secondary label · Jul 8</span></div>
  <div class="row"><span class="k">xs · 11</span><span class="s ledger-overline">Overline / eyebrow</span></div>
</body>
</html>
