<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-inverse); }
  .display { font-family: var(--font-serif); color: var(--paper); font-size: 34px; line-height: 1.15; font-weight: 400; }
  .display em { color: var(--lime-400); font-style: italic; }
  .note { margin-top: 14px; font-family: var(--font-mono); font-size: 11px; color: var(--ink-400); letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div class="display">Know exactly where your <em>won</em> went this month.</div>
  <div class="note">IBM Plex Serif · reserved for hero headlines and empty-state prose</div>
</body>
</html>
